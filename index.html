<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karz we Kredit Dolandyryş</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: #f8fafc;
            padding: 20px;
            color: #0f172a;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
            margin-bottom: 20px;
        }

        h2 {
            font-size: 1.5rem;
            margin-bottom: 15px;
            color: #0f172a;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
        }

        .result-box {
            background-color: #fff5f5;
            padding: 16px;
            border-radius: 16px;
            margin-top: 15px;
        }

        .result-box p {
            color: #991b1b;
            margin-bottom: 8px;
        }

        .result-box span {
            font-weight: bold;
            font-size: 1.2rem;
        }

        /* SANAW DIZAÝNY */
        .investor-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px 0;
            border-bottom: 1px solid #f1f5f9;
        }

        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-color: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            overflow: hidden;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .investor-info {
            flex: 1;
        }

        .investor-name {
            font-weight: 600;
        }

        .investor-details {
            font-size: 0.85rem;
            color: #64748b;
        }

        /* ✨ KREDIT ALMAK DÜWMESI (SKRINŞOTDAKY ÝALY) */
        .btn-kredit {
            background-color: #00b074;
            color: white;
            border: none;
            width: 100%;
            padding: 15px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 12px rgba(0, 176, 116, 0.2);
        }

        .btn-kredit:active {
            transform: scale(0.98);
        }

        .hidden-menu {
            display: none;
            background: #f1f5f9;
            margin-top: 15px;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- KALKULÝATOR -->
        <div class="card">
            <h2>Kredi Hesaplama (TL)</h2>
            <div class="form-group">
                <label>Alınacak Nakit Miktarı (₺):</label>
                <input type="number" id="amount-tl" value="5000" oninput="calculate()">
            </div>
            <div class="form-group">
                <label>Vade Süresi:</label>
                <select id="months-tl" onchange="calculate()">
                    <option value="1">1 Aylık</option>
                    <option value="2">2 Aylık</option>
                    <option value="3">3 Aylık</option>
                    <option value="4">4 Aylık</option>
                </select>
            </div>

            <div class="result-box">
                <p>Toplam Faiz Bedeli (%15): <span id="faiz">750.00</span> ₺</p>
                <p style="color: #0f172a;">Geri Ödenecek Toplam Tutar: <span id="jemi">5750.00</span> ₺</p>
            </div>
        </div>

        <!-- SANAW WE DÜWME -->
        <div class="card">
            <h2>Karz Berlen Şahsyýetler</h2>
            <p style="font-size: 0.85rem; color: #64748b; margin-bottom: 15px;">
                * Gizlinlik we howpsuzlyk maksady bilen karz alan şahsyýetleriň atlary doly görkezilmeýär.
            </p>

            <!-- Sanaw şu ýere çykýar -->
            <div id="sanaw"></div>

            <!-- DÜWME -->
            <button class="btn-kredit" onclick="openMenu()">✨ Kredit Almak</button>

            <!-- AÇYLÝAN MENÝU -->
            <div id="kreditMenu" class="hidden-menu">
                <p style="margin-bottom: 10px; font-weight: bold;">Resminamalaryňyzy IMO ýa-da WhatsApp arkaly ugradyň:</p>
                <a href="https://wa.me/905016873001" target="_blank" style="color: green; font-weight: bold; text-decoration: none;">WhatsApp-a Geç</a>
            </div>
        </div>

    </div>

    <!-- DATA ÝÜKLEMEK -->
    <script src="data.js"></script>
    <script>
        // Kalkulýator hasaplamasy
        function calculate() {
            const emlek = parseFloat(document.getElementById('amount-tl').value) || 0;
            const ay = parseInt(document.getElementById('months-tl').value) || 1;
            
            const faizMukdary = emlek * 0.15 * ay;
            const jemiMukdary = emlek + faizMukdary;

            document.getElementById('faiz').innerText = faizMukdary.toFixed(2);
            document.getElementById('jemi').innerText = jemiMukdary.toFixed(2);
        }

        // Düwmä basylanda açylmagy
        function openMenu() {
            const menu = document.getElementById('kreditMenu');
            menu.style.display = (menu.style.display === 'block') ? 'none' : 'block';
        }

        // data.js-den maglumatlary okamak we suraty dikeltmek
        const sanawDiv = document.getElementById('sanaw');
        if (typeof loanData !== 'undefined') {
            loanData.forEach(user => {
                const row = document.createElement('div');
                row.className = 'investor-item';

                // Surat barmy ýokmy barlamak (Eger surat ýoly boş bolsa, adynyň baş harpyny goýýar)
                const avatarImg = (user.img && user.img.trim() !== "") ? `<img src="${user.img}">` : user.name[0];

                row.innerHTML = `
                    <div class="avatar">${avatarImg}</div>
                    <div class="investor-info">
                        <div class="investor-name">${user.name} ${user.surname}</div>
                        <div class="investor-details">Karz: ${user.borrowed} | Jemi: ${user.payback}</div>
                    </div>
                `;
                sanawDiv.appendChild(row);
            });
        }
    </script>
</body>
</html>
